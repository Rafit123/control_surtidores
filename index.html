<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestión de Surtidores y Ventas</title>
  <link rel="stylesheet" href="styles.css">
  <!-- CDN CDN de Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

  <div class="container">
    <h1>⛽ Control de Surtidores</h1>

    <!-- Sección Dictado por Voz (Web Speech API) -->
    <section class="card voice-card">
      <h2>🎙️ Dictado por Voz (Web Speech API)</h2>
      <p>Haz clic en el botón y di algo como: <i>"Registrar venta en surtidor 1"</i></p>
      <button id="btnVoice" class="btn btn-voice">Iniciar Dictado</button>
      <p id="voiceOutput" class="voice-output">Esperando voz...</p>
    </section>

    <!-- Formulario Nueva Venta -->
    <section class="card">
      <h2>🛒 Registrar Venta</h2>
      <form id="formVenta">
        <div class="form-group">
          <label for="selectSurtidor">Surtidor:</label>
          <select id="selectSurtidor" required>
            <option value="">Cargando surtidores...</option>
          </select>
        </div>

        <div class="form-group">
          <label for="litros">Litros:</label>
          <input type="number" step="0.01" id="litros" placeholder="Ej. 20" required>
        </div>

        <div class="form-group">
          <label for="precio">Precio por Litro:</label>
          <input type="number" step="0.01" id="precio" placeholder="Ej. 3.74" required>
        </div>

        <button type="submit" class="btn">Guardar Venta</button>
      </form>
    </section>

    <!-- Registro de Ventas -->
    <section class="card">
      <h2>📊 Ventas Recientes</h2>
      <table id="tablaVentas">
        <thead>
          <tr>
            <th>ID</th>
            <th>Fecha</th>
            <th>Surtidor</th>
            <th>Combustible</th>
            <th>Litros</th>
            <th>Total</th>
          </tr>
        </thead>
        <tbody>
          <!-- Se llena dinámicamente -->
        </tbody>
      </table>
    </section>
  </div>

  <script src="app.js"></script>
</body>
</html>
