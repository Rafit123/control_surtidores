<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestión de Surtidores y Ventas</title>
  <link rel="stylesheet" href="styles.css">
  <!-- CDN de Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

  <div class="container">
    
    <!-- Sección de Login -->
    <section id="loginSection" class="card login-card">
      <h1>⛽ Control de Surtidores</h1>
      <h2>Iniciar Sesión</h2>
      <form id="formLogin">
        <div class="form-group">
          <label for="loginUser">Usuario:</label>
          <input type="text" id="loginUser" required placeholder="Ej. docente">
        </div>
        <div class="form-group">
          <label for="loginPass">Contraseña:</label>
          <input type="password" id="loginPass" required placeholder="••••••">
        </div>
        <button type="submit" id="btnLoginSubmit" class="btn">Ingresar</button>
        <p id="loginError" class="error-msg" style="display: none;"></p>
      </form>
    </section>

    <!-- Sección Principal (Oculta por defecto) -->
    <section id="appSection" style="display: none;">
      <div class="header-bar">
        <h1>⛽ Control de Surtidores</h1>
        <button id="btnLogout" class="btn-logout">Cerrar Sesión</button>
      </div>

      <!-- Banner para Notificaciones/Feedback -->
      <div id="statusToast" class="toast" style="display: none;"></div>

      <!-- Sección Dictado por Voz -->
      <section class="card voice-card">
        <h2>🎙️ Dictado por Voz (Web Speech API)</h2>
        <p>Haz clic en el botón y di algo como: <i>"Registrar 20 litros a 3.74 en surtidor 1"</i></p>
        <button id="btnVoice" class="btn btn-voice">Iniciar Dictado</button>
        <p id="voiceOutput" class="voice-output">Esperando voz...</p>
      </section>

      <!-- Formulario Nueva Venta -->
      <section class="card">
        <h2>🛒 Registrar Venta</h2>
        <form id="formVenta">
          <div class="form-group">
            <label for="selectSurtidor">Surtidor:</label>
            <select id="selectSurtidor" required>
              <option value="">Cargando surtidores...</option>
            </select>
          </div>

          <div class="form-group">
            <label for="litros">Litros:</label>
            <input type="number" step="0.01" id="litros" placeholder="Ej. 20" required>
          </div>

          <div class="form-group">
            <label for="precio">Precio por Litro (Bs.):</label>
            <input type="number" step="0.01" id="precio" placeholder="Ej. 3.74" required>
          </div>

          <button type="submit" id="btnSubmitVenta" class="btn">Guardar Venta</button>
        </form>
      </section>

      <!-- Registro de Ventas -->
      <section class="card">
        <h2>📊 Ventas Recientes</h2>
        <table id="tablaVentas">
          <thead>
            <tr>
              <th>ID</th>
              <th>Fecha</th>
              <th>Surtidor</th>
              <th>Combustible</th>
              <th>Litros</th>
              <th>Total</th>
            </tr>
          </thead>
          <tbody>
            <!-- Se llena dinámicamente -->
          </tbody>
        </table>
      </section>
    </section>

  </div>

  <script src="app.js"></script>
</body>
</html>
